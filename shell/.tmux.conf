# run regular interactive shells not login shells
set -g default-command "${SHELL}"

# change prefix to Ctrl-a (like in gnu-screen)

# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix


# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# screen mode
set -g default-terminal "screen-256color"

# source config file
bind r source-file ~/.tmux.conf

# history
set -g history-limit 4096

# allow terminal scrolling
set-option -g terminal-overrides 'xterm*:smcup@:rmcup@'

set -g renumber-windows on

# use vi mode
setw -g mode-keys vi
set -g status-keys vi
# setw -g utf8 on

set -g set-clipboard external
# set -as terminal-features ',rxvt-unicode-256color:clipboard'
# set-option -g 

# use mouse in copy mode
# setw -g mode-mouse off
# mouse behavior
setw -g mouse on
# bind -T root MouseDrag1Pane copy-mode
# unbind -T root MouseDrag1Pane

# when we finish "selecting" send it to pbcopy (and into the OS X buffer)
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy #-pipe-and-cancel "xclip -se c -i"

# Setup 'v' to begin selection as in Vim
# You enter with C-b [ and then "v" - then normal keypresses to "highlight"
# .. [Enter] or "y" will select (because of below bindings)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy #-pipe-and-cancel "xclip -se c -i"
bind-key -T copy-mode-vi Enter send-keys -X copy #-pipe-and-cancel "xclip -se c -i"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# easy-to-remember split pane commands
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# colon :
bind : command-prompt

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize the pane
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3

# status line
# set -g status-utf8 on
set -g status-justify left
set -g status-bg default
set -g status-fg colour12
set -g status-interval 2


# Info on left (I don't have a session display for now)
set -g status-left ''

# some key-binding changes
bind x kill-pane
bind X next-layout
bind Z previous-layout

#urxvt tab like window switching (-n: no prior escape seq)
bind -n S-down new-window
bind -n S-left prev
bind -n S-right next
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

set -g default-terminal "screen-256color"

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g mode-style 'fg=colour15 bg=colour8 bold'

# panes
set -g pane-border-style 'fg=colour8 bg=colour0'
set -g pane-active-border-style 'fg=colour9 bg=colour0'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour137 bg=colour236 dim'
set -g status-left ''
set -g status-right '[#{session_name}]'
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-style 'fg=colour6 bg=colour236'
setw -g window-status-format ' #I#[fg=colour249]:#[fg=colour250]#W#[fg=colour249]#F '
setw -g window-status-current-style 'fg=colour1 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# tmux clock
set -g clock-mode-colour colour15

# messages
set -g message-style 'fg=colour232 bg=colour15 bold'
